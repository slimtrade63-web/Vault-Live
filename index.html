<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault v80</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <h1>🛡️ Vault v80 Institutional</h1>

    <!-- Regime Indicator -->
    <div id="regime-bar">
      <span id="regime-label">Loading market regime...</span>
      <span id="regime-confidence"></span>
      <span id="regime-description"></span>
      <span id="regime-timestamp"></span>
    </div>

    <!-- Main Layout -->
    <div id="main-layout">

      <!-- Left Panel: Sector Strength -->
      <div id="sector-panel">
        <h3>Sector Strength</h3>
        <div id="sector-chart"></div>
        <p id="sector-timestamp"></p>
      </div>

      <!-- Right Panel: Scanner -->
      <div id="scanner-panel">
        <div id="buttons"></div>
        <button id="report-btn" disabled>Generate Report</button>
        <h2 id="strategy-label"></h2>
        <p id="result-count"></p>
        <table id="results">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Current Price</th>
              <th>Trigger Price</th>
              <th>Metric</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>
  </body>
</html>
